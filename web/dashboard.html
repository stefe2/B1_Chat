<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B1 Chat — Console droïdes</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1c232d; --line: #2a323d;
    --txt: #d7dde5; --muted: #8a96a5; --accent: #e8a33d; --accent2: #4da3ff;
    --ok: #3fb950; --warn: #d29922; --bad: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 12px clamp(12px, 2vw, 20px);
    background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5; flex-wrap: wrap;
  }
  header h1 { font-size: clamp(15px, 2.4vw, 19px); margin: 0; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  .grow { flex: 1; }
  .status { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--bad); }
  .dot.on { background: var(--ok); }
  .dot.demo { background: var(--warn); }
  button {
    background: var(--panel2); color: var(--txt); border: 1px solid var(--line);
    padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  button:hover { border-color: var(--accent2); }
  button.primary { background: var(--accent); color: #1a1205; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); }
  main {
    display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px;
    padding: clamp(12px, 2vw, 20px); max-width: 1500px; margin: 0 auto;
  }
  @media (max-width: 1024px) {
    main { grid-template-columns: 1fr; }
    main > .card { grid-row: auto !important; grid-column: auto !important; }
  }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .card h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 460px; }
  th, td { text-align: left; padding: 8px 8px; border-bottom: 1px solid var(--line); font-size: 13px; }
  th { color: var(--muted); font-weight: 600; }
  td.mac { font-family: ui-monospace, monospace; color: var(--muted); }
  .name-input { width: 110px; background: var(--panel2); border: 1px solid var(--line); color: var(--txt); border-radius: 5px; padding: 4px 6px; }
  .rssi { font-family: ui-monospace, monospace; }
  .badge { padding: 1px 7px; border-radius: 10px; font-size: 11px; background: var(--panel2); border: 1px solid var(--line); }
  .badge.ok { color: var(--ok); border-color: #24512f; }
  .badge.stale { color: var(--bad); border-color: #5a2320; }
  .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .row label { min-width: 92px; color: var(--muted); }
  select, input[type=number], input[type=text], input[type=password] {
    background: var(--panel2); border: 1px solid var(--line); color: var(--txt);
    border-radius: 6px; padding: 6px 8px; font-size: 13px;
  }
  input[type=range] { flex: 1; }
  .val { min-width: 34px; text-align: right; font-family: ui-monospace, monospace; color: var(--accent); }
  .sub { color: var(--muted); font-size: 12px; margin: -6px 0 12px; }
  #log {
    background: #0a0d12; border: 1px solid var(--line); border-radius: 8px;
    height: 220px; overflow-y: auto; padding: 10px; font-family: ui-monospace, monospace;
    font-size: 12px; white-space: pre-wrap; color: #b7c2d0;
  }
  #log .tx { color: var(--accent2); }
  #log .rx { color: var(--ok); }
  #log .sys { color: var(--muted); }
  .divider { height: 1px; background: var(--line); margin: 14px 0; }
  .hint { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>B1&nbsp;<span>Chat</span> — Console droïdes</h1>
  <div class="grow"></div>
  <div class="status"><span id="dot" class="dot"></span><span id="statusText">Déconnecté</span></div>
  <button id="btnConnect" class="primary">Connecter (USB)</button>
  <button id="btnDemo">Mode démo</button>
</header>

<main>
  <section class="card" style="grid-row: span 2;">
    <h2>Droïdes détectés (<span id="count">0</span>)</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Nom</th><th>ID</th><th>MAC</th><th>Vu</th><th>RSSI</th><th>État</th></tr>
        </thead>
        <tbody id="droidRows"></tbody>
      </table>
    </div>
    <p id="empty" class="hint" style="margin-top:12px;">Aucun droïde. Connecte le maître en USB ou lance le mode démo.</p>
  </section>

  <section class="card">
    <h2>Animation</h2>
    <div class="row">
      <label>Cible</label>
      <select id="animTarget"><option value="65535">Tous les droïdes</option></select>
    </div>
    <div class="row">
      <label>Geste</label>
      <select id="animId"></select>
    </div>
    <div class="row">
      <button class="primary" id="btnPlayAnim">Jouer</button>
      <span class="hint">Envoie <code>anim</code> au maître.</span>
    </div>

    <div class="divider"></div>
    <h2>Paramètres d'animation</h2>
    <div class="row"><label>Fréquence</label><input type="range" id="pFreq" min="0" max="100" value="50"><span class="val" id="vFreq">50</span></div>
    <div class="row"><label>Amplitude</label><input type="range" id="pAmp" min="0" max="100" value="60"><span class="val" id="vAmp">60</span></div>
    <div class="row"><label>Vitesse</label><input type="range" id="pSpeed" min="0" max="100" value="50"><span class="val" id="vSpeed">50</span></div>
    <div class="row"><button id="btnApplyParams">Appliquer</button></div>
  </section>

  <section class="card">
    <h2>Audio (maître)</h2>
    <div class="row"><label>Volume</label><input type="range" id="pVol" min="0" max="30" value="20"><span class="val" id="vVol">20</span></div>
    <div class="row"><button id="btnApplyVol">Régler le volume</button></div>
    <div class="row">
      <label>Piste</label>
      <input type="number" id="track" min="1" max="10" value="1" style="width:70px;">
      <button id="btnPlayTrack">Tester</button>
    </div>
  </section>

  <section class="card" style="grid-column: 1 / -1;">
    <h2>Journal</h2>
    <div id="log"></div>
  </section>
</main>

<script>
"use strict";

// --- Animations (alignées avec AnimId dans animation.h) --------------------
const ANIMS = ["IDLE","LOOK_AROUND","NOD_YES","SHAKE_NO","CURIOUS_TILT","SCAN_SLOW","ALERT_SNAP","TRACK"];

// --- État global -----------------------------------------------------------
const droids = new Map();   // id -> {id, mac, name, lastSeen(ms epoch), rssi, state}
let port = null, reader = null, writer = null;
let demo = false, demoTimer = null;

// --- UI refs ---------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const dot = $("dot"), statusText = $("statusText");

// Remplit la liste des animations.
ANIMS.forEach((n, i) => {
  const o = document.createElement("option"); o.value = i; o.textContent = `${i} — ${n}`;
  $("animId").appendChild(o);
});
$("animId").value = 1;

// --- Journalisation ---------------------------------------------------------
function log(msg, cls = "sys") {
  const el = $("log");
  const t = new Date().toLocaleTimeString();
  const line = document.createElement("div");
  line.className = cls; line.textContent = `[${t}] ${msg}`;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
  while (el.childElementCount > 300) el.removeChild(el.firstChild);
}

// --- Envoi d'une commande (JSON par ligne) ---------------------------------
async function sendCmd(obj) {
  const line = JSON.stringify(obj);
  log("→ " + line, "tx");
  if (demo) { handleDemoCommand(obj); return; }
  if (!writer) { log("Non connecté — commande ignorée.", "sys"); return; }
  await writer.write(new TextEncoder().encode(line + "\n"));
}

// --- Réception d'un événement du maître -------------------------------------
function handleEvent(obj) {
  if (obj.evt === "droids" && Array.isArray(obj.list)) {
    obj.list.forEach(upsertDroid);
    renderDroids();
  } else if (obj.evt === "log") {
    log("⟵ " + obj.msg, "rx");
  } else if (obj.evt === "state") {
    log("⟵ state " + JSON.stringify(obj), "rx");
  } else {
    log("⟵ " + JSON.stringify(obj), "rx");
  }
}

function upsertDroid(d) {
  const prev = droids.get(d.id);
  if (!prev) log(`Nouveau B1 ${hex(d.id)} détecté.`, "rx");
  droids.set(d.id, {
    id: d.id, mac: d.mac || (prev && prev.mac) || "—",
    name: (prev && prev.name) || d.name || "",
    lastSeen: Date.now(), rssi: (d.rssi ?? (prev && prev.rssi) ?? 0),
    state: d.state ?? 0,
  });
}

// --- Rendu du tableau -------------------------------------------------------
function hex(id) { return id.toString(16).toUpperCase().padStart(4, "0"); }

function renderDroids() {
  const tbody = $("droidRows"); tbody.innerHTML = "";
  const now = Date.now();
  const ids = [...droids.keys()].sort();
  $("count").textContent = ids.length;
  $("empty").style.display = ids.length ? "none" : "block";

  // Met à jour la liste de ciblage.
  const sel = $("animTarget"); const cur = sel.value;
  sel.innerHTML = '<option value="65535">Tous les droïdes</option>';

  for (const id of ids) {
    const d = droids.get(id);
    const ageS = Math.round((now - d.lastSeen) / 1000);
    const stale = ageS > 6;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><input class="name-input" value="${escapeHtml(d.name)}" data-id="${id}" placeholder="B1-${hex(id)}"></td>
      <td class="mac">${hex(id)}</td>
      <td class="mac">${d.mac}</td>
      <td>${ageS}s</td>
      <td class="rssi">${d.rssi} dBm</td>
      <td><span class="badge ${stale ? "stale" : "ok"}">${stale ? "perdu" : "en ligne"}</span></td>`;
    tbody.appendChild(tr);

    const o = document.createElement("option"); o.value = id;
    o.textContent = `${d.name || "B1-" + hex(id)} (${hex(id)})`;
    sel.appendChild(o);
  }
  sel.value = [...sel.options].some(o => o.value === cur) ? cur : "65535";

  tbody.querySelectorAll(".name-input").forEach(inp => {
    inp.addEventListener("change", () => {
      const id = Number(inp.dataset.id);
      const d = droids.get(id); if (d) d.name = inp.value;
      sendCmd({ cmd: "name", id, name: inp.value });
    });
  });
}

function escapeHtml(s) { return (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c])); }

// --- Web Serial -------------------------------------------------------------
async function connect() {
  if (!("serial" in navigator)) { log("Web Serial non supporté (utilise Chrome/Edge).", "sys"); return; }
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    stopDemo();
    writer = port.writable.getWriter();
    setStatus("connected");
    log("Connecté au maître via USB.", "sys");
    readLoop();
    sendCmd({ cmd: "list" });
  } catch (e) { log("Connexion annulée : " + e.message, "sys"); }
}

async function readLoop() {
  const decoder = new TextDecoderStream();
  const readable = port.readable.pipeThrough(decoder);
  reader = readable.getReader();
  let buf = "";
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += value;
      let nl;
      while ((nl = buf.indexOf("\n")) >= 0) {
        const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
        if (!line) continue;
        try { handleEvent(JSON.parse(line)); }
        catch { log("⟵ " + line, "rx"); }
      }
    }
  } catch (e) { log("Lecture interrompue : " + e.message, "sys"); }
}

function setStatus(mode) {
  dot.className = "dot" + (mode === "connected" ? " on" : mode === "demo" ? " demo" : "");
  statusText.textContent = mode === "connected" ? "Connecté (USB)" : mode === "demo" ? "Mode démo" : "Déconnecté";
}

// --- Mode démo (simule des droïdes) ----------------------------------------
function startDemo() {
  stopDemo(); demo = true; setStatus("demo");
  droids.clear();
  const n = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) addFakeDroid();
  renderDroids();
  log("Mode démo activé — droïdes simulés.", "sys");
  demoTimer = setInterval(demoTick, 1500);
}
function stopDemo() { demo = false; if (demoTimer) { clearInterval(demoTimer); demoTimer = null; } }

function addFakeDroid() {
  const id = 0x3000 + Math.floor(Math.random() * 0xCFFF);
  const mac = "24:6F:28:" + [0,0,0].map(() => Math.floor(Math.random()*256).toString(16).padStart(2,"0").toUpperCase()).join(":");
  droids.set(id, { id, mac, name: "", lastSeen: Date.now(), rssi: -40 - Math.floor(Math.random()*40), state: 0 });
  return id;
}
function demoTick() {
  // Rafraîchit "vu", varie le RSSI, ajoute parfois un nouveau B1.
  for (const d of droids.values()) { d.lastSeen = Date.now(); d.rssi = Math.max(-90, Math.min(-30, d.rssi + (Math.random()*6-3)|0)); }
  if (Math.random() < 0.12 && droids.size < 10) {
    const id = addFakeDroid();
    log(`Nouveau B1 ${hex(id)} connecté au mesh.`, "rx");
  }
  renderDroids();
}
function handleDemoCommand(obj) {
  if (obj.cmd === "list") { renderDroids(); return; }
  if (obj.cmd === "anim") log(`(démo) anim ${ANIMS[obj.animId] || obj.animId} → ${obj.target === 65535 ? "tous" : hex(obj.target)}`, "sys");
  if (obj.cmd === "volume") log(`(démo) volume = ${obj.value}`, "sys");
  if (obj.cmd === "playTrack") log(`(démo) lecture piste ${obj.track}`, "sys");
  if (obj.cmd === "config") log(`(démo) params freq=${obj.freq} amp=${obj.amp} speed=${obj.speed}`, "sys");
  if (obj.cmd === "name") log(`(démo) ${hex(obj.id)} renommé "${obj.name}"`, "sys");
}

// --- Bindings UI ------------------------------------------------------------
$("btnConnect").onclick = connect;
$("btnDemo").onclick = startDemo;

$("btnPlayAnim").onclick = () => sendCmd({
  cmd: "anim", target: Number($("animTarget").value), animId: Number($("animId").value), seed: (Math.random()*4294967295)>>>0
});
$("btnApplyVol").onclick = () => sendCmd({ cmd: "volume", value: Number($("pVol").value) });
$("btnPlayTrack").onclick = () => sendCmd({ cmd: "playTrack", track: Number($("track").value) });
$("btnApplyParams").onclick = () => sendCmd({
  cmd: "config", target: Number($("animTarget").value),
  freq: Number($("pFreq").value), amp: Number($("pAmp").value), speed: Number($("pSpeed").value)
});

// Sliders -> affichage valeur.
[["pFreq","vFreq"],["pAmp","vAmp"],["pSpeed","vSpeed"],["pVol","vVol"]].forEach(([s,v]) => {
  const el = $(s); const out = $(v);
  el.addEventListener("input", () => out.textContent = el.value);
});

log("Console prête. « Connecter (USB) » pour le maître, ou « Mode démo ».", "sys");
</script>
</body>
</html>
