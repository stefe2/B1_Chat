<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar</title>
  <style>
    :root {
      --radar-green: #2dff6f;
      --radar-dim: rgba(45, 255, 111, 0.22);
      --border: #1e4b2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      overflow: hidden;
    }

    .window {
      width: min(620px, 92vw);
      display: grid;
      place-items: center;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .radar {
      position: relative;
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
      border: 2px solid var(--radar-green);
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 20px rgba(45,255,111,.25),
        inset 0 0 30px rgba(45,255,111,.06);
      background:
        radial-gradient(circle, transparent 24%, var(--radar-dim) 24.5%, transparent 25%),
        radial-gradient(circle, transparent 49%, var(--radar-dim) 49.5%, transparent 50%),
        radial-gradient(circle, transparent 74%, var(--radar-dim) 74.5%, transparent 75%),
        linear-gradient(90deg, transparent 49.7%, var(--radar-dim) 50%, transparent 50.3%),
        linear-gradient(transparent 49.7%, var(--radar-dim) 50%, transparent 50.3%),
        repeating-conic-gradient(from 0deg, rgba(45,255,111,.11) 0deg 1deg, transparent 1deg 30deg),
        radial-gradient(circle, rgba(12,60,27,.8), #021006 62%, #000 100%);
    }

    .radar::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, transparent 55%, rgba(0,0,0,.58) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.018) 0,
          rgba(255,255,255,.018) 1px,
          transparent 1px,
          transparent 4px
        );
      pointer-events: none;
    }

    .sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transform-origin: 50% 50%;
      animation: rotate 4s linear infinite;
      background: conic-gradient(
        from -90deg at 50% 50%,
        transparent 0deg,
        transparent 318deg,
        rgba(45,255,111,.08) 334deg,
        rgba(45,255,111,.22) 348deg,
        rgba(45,255,111,.58) 360deg
      );
      filter: drop-shadow(0 0 8px rgba(45,255,111,.5));
    }

    .center-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      left: 50%;
      top: 50%;
      translate: -50% -50%;
      border-radius: 50%;
      background: var(--radar-green);
      box-shadow: 0 0 14px var(--radar-green);
      z-index: 3;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }
      50% { opacity: 1; transform: scale(1.35); }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="radar">
      <div class="sweep"></div>
      <div class="center-dot"></div>
</div>
  </div>
</body>
</html>
