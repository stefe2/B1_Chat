; PlatformIO Project Configuration File
;
; B1 Battle Droid — single firmware (master / slave) on ESP32.
; See project.md for the full architecture.
;
; https://docs.platformio.org/page/projectconf.html

[env]
; Platform pinned to the pioarduino fork (Arduino-ESP32 core 3.1.3 / ESP-IDF 5.3 —
; required for esp_now_recv_info_t used by mesh_comm.cpp). "platform = espressif32"
; alone is ambiguous: locally, PlatformIO would prefer this fork already installed by
; URL (its version number, 53.x, is higher than the official registry's), but CI, which
; doesn't know this fork, used to fall back to the official registry (a much newer
; version, without esp_now_recv_info_t) and fail to build. Always keep this identical
; here and locally (pio pkg update -p) to avoid a new divergence.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
build_flags =
    -D MESH_TTL=4
    -D GROUP_KEY=\"changeme\"

; The master/slave role is set in src/config.h (#define IS_MASTER 1|0).
[env:b1]
build_flags =
    ${env.build_flags}

; Environments dedicated to CI releases (.github/workflows/firmware-release.yml):
; build both roles without touching src/config.h, by overriding the IS_MASTER
; define on the command line (see the #ifndef IS_MASTER in config.h).
; Don't affect [env:b1] above, used for local flashing/dev.
[env:b1_master]
build_flags =
    ${env.build_flags}
    -D IS_MASTER=1

[env:b1_slave]
build_flags =
    ${env.build_flags}
    -D IS_MASTER=0
