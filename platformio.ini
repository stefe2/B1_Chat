; PlatformIO Project Configuration File
;
; B1 Battle Droid — firmware unique (maître / esclave) sur ESP32.
; Voir project.md pour l'architecture complète.
;
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.5
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6
build_flags =
    -D MESH_TTL=4
    -D GROUP_KEY=\"changeme\"

; Le rôle maître/esclave se règle dans src/config.h (#define IS_MASTER 1|0).
[env:b1]
build_flags =
    ${env.build_flags}
