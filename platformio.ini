; PlatformIO Project Configuration File
;
; B1 Battle Droid — firmware unique (maître / esclave) sur ESP32.
; Voir project.md pour l'architecture complète.
;
; https://docs.platformio.org/page/projectconf.html

[env]
; Plateforme figee sur le fork pioarduino (Arduino-ESP32 core 3.1.3 / ESP-IDF 5.3 —
; requis pour esp_now_recv_info_t utilise par mesh_comm.cpp). "platform = espressif32"
; seul est ambigu : en local, PlatformIO preferait ce fork deja installe par URL (son
; numero de version, 53.x, est plus eleve que le registre officiel), mais la CI, qui ne
; connait pas ce fork, retombait sur le registre officiel (version bien plus recente,
; sans esp_now_recv_info_t) et echouait a la compilation. Toujours garder identique ici
; et en local (pio pkg update -p) pour eviter une nouvelle divergence.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6
    bblanchon/ArduinoJson @ ^7.0.4
build_flags =
    -D MESH_TTL=4
    -D GROUP_KEY=\"changeme\"

; Le rôle maître/esclave se règle dans src/config.h (#define IS_MASTER 1|0).
[env:b1]
build_flags =
    ${env.build_flags}

; Environnements dedies a la release CI (.github/workflows/firmware-release.yml) :
; compilent les deux roles sans toucher a src/config.h, via override du define
; IS_MASTER en ligne de commande (voir le #ifndef IS_MASTER dans config.h).
; N'affectent pas [env:b1] ci-dessus, utilise pour le flash/dev local.
[env:b1_master]
build_flags =
    ${env.build_flags}
    -D IS_MASTER=1

[env:b1_slave]
build_flags =
    ${env.build_flags}
    -D IS_MASTER=0
