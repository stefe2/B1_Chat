name: Release firmware

# Se declenche quand FW_VERSION (src/config.h) change sur main, ou manuellement.
# Idempotent : si le tag fw-vX.Y.Z existe deja sur GitHub, ne fait rien.
on:
  push:
    branches: [main]
    paths:
      - src/config.h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lire la version (FW_VERSION dans src/config.h)
        id: version
        run: |
          VERSION=$(grep -oP '#define\s+FW_VERSION\s+"\K[^"]+' src/config.h)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=fw-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verifier si cette version est deja publiee
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "${{ steps.version.outputs.tag }} existe deja sur GitHub, rien a faire."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer PlatformIO
        if: steps.check.outputs.skip == 'false'
        run: pip install -U platformio

      - name: Compiler le role maitre
        if: steps.check.outputs.skip == 'false'
        run: pio run -e b1_master

      - name: Compiler le role esclave
        if: steps.check.outputs.skip == 'false'
        run: pio run -e b1_slave

      - name: Preparer les artefacts et le manifeste
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp .pio/build/b1_master/firmware.bin "dist/b1-master-v$VERSION.bin"
          cp .pio/build/b1_slave/firmware.bin "dist/b1-slave-v$VERSION.bin"
          MASTER_SHA=$(sha256sum "dist/b1-master-v$VERSION.bin" | cut -d' ' -f1)
          SLAVE_SHA=$(sha256sum "dist/b1-slave-v$VERSION.bin" | cut -d' ' -f1)
          MASTER_SIZE=$(stat -c%s "dist/b1-master-v$VERSION.bin")
          SLAVE_SIZE=$(stat -c%s "dist/b1-slave-v$VERSION.bin")
          jq -n --arg version "$VERSION" --arg date "$(date -u +%Y-%m-%d)" \
             --arg mfile "b1-master-v$VERSION.bin" --arg msha "$MASTER_SHA" --argjson msize "$MASTER_SIZE" \
             --arg sfile "b1-slave-v$VERSION.bin" --arg ssha "$SLAVE_SHA" --argjson ssize "$SLAVE_SIZE" \
             '{version:$version, date:$date, notes:"", files:[
                {role:"master", file:$mfile, sha256:$msha, size:$msize},
                {role:"slave", file:$sfile, sha256:$ssha, size:$ssize}
             ]}' > dist/firmware_manifest.json

      - name: Creer et pousser le tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publier la release GitHub
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Firmware B1 v${{ steps.version.outputs.version }}"
          files: |
            dist/b1-master-v${{ steps.version.outputs.version }}.bin
            dist/b1-slave-v${{ steps.version.outputs.version }}.bin
            dist/firmware_manifest.json
