name: Release firmware

# Triggers when FW_VERSION (src/config.h) changes on main, or manually.
# Idempotent: if the tag fw-vX.Y.Z already exists on GitHub, does nothing.
on:
  push:
    branches: [main]
    paths:
      - src/config.h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read the version (FW_VERSION in src/config.h)
        id: version
        run: |
          VERSION=$(grep -oP '#define\s+FW_VERSION\s+"\K[^"]+' src/config.h)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=fw-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if this version is already published
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "${{ steps.version.outputs.tag }} already exists on GitHub, nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        if: steps.check.outputs.skip == 'false'
        run: pip install -U platformio

      - name: Build the master role
        if: steps.check.outputs.skip == 'false'
        run: pio run -e b1_master

      - name: Build the slave role
        if: steps.check.outputs.skip == 'false'
        run: pio run -e b1_slave

      - name: Prepare the artifacts and manifest
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp .pio/build/b1_master/firmware.bin "dist/b1-master-v$VERSION.bin"
          cp .pio/build/b1_slave/firmware.bin "dist/b1-slave-v$VERSION.bin"
          # bootloader + partition table are role-independent (IS_MASTER only affects the app):
          # ship ONE shared copy of each, needed to flash a virgin board (offsets 0x1000/0x8000)
          # since the app-only flash at 0x10000 assumes they're already present.
          cp .pio/build/b1_master/bootloader.bin "dist/bootloader.bin"
          cp .pio/build/b1_master/partitions.bin "dist/partitions.bin"
          MASTER_SHA=$(sha256sum "dist/b1-master-v$VERSION.bin" | cut -d' ' -f1)
          SLAVE_SHA=$(sha256sum "dist/b1-slave-v$VERSION.bin" | cut -d' ' -f1)
          BOOT_SHA=$(sha256sum "dist/bootloader.bin" | cut -d' ' -f1)
          PART_SHA=$(sha256sum "dist/partitions.bin" | cut -d' ' -f1)
          MASTER_SIZE=$(stat -c%s "dist/b1-master-v$VERSION.bin")
          SLAVE_SIZE=$(stat -c%s "dist/b1-slave-v$VERSION.bin")
          BOOT_SIZE=$(stat -c%s "dist/bootloader.bin")
          PART_SIZE=$(stat -c%s "dist/partitions.bin")
          jq -n --arg version "$VERSION" --arg date "$(date -u +%Y-%m-%d)" \
             --arg mfile "b1-master-v$VERSION.bin" --arg msha "$MASTER_SHA" --argjson msize "$MASTER_SIZE" \
             --arg sfile "b1-slave-v$VERSION.bin" --arg ssha "$SLAVE_SHA" --argjson ssize "$SLAVE_SIZE" \
             --arg bfile "bootloader.bin" --arg bsha "$BOOT_SHA" --argjson bsize "$BOOT_SIZE" \
             --arg pfile "partitions.bin" --arg psha "$PART_SHA" --argjson psize "$PART_SIZE" \
             '{version:$version, date:$date, notes:"", files:[
                {role:"master", file:$mfile, sha256:$msha, size:$msize},
                {role:"slave", file:$sfile, sha256:$ssha, size:$ssize},
                {role:"bootloader", file:$bfile, sha256:$bsha, size:$bsize},
                {role:"partitions", file:$pfile, sha256:$psha, size:$psize}
             ]}' > dist/firmware_manifest.json

      - name: Create and push the tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish the GitHub release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Firmware B1 v${{ steps.version.outputs.version }}"
          files: |
            dist/b1-master-v${{ steps.version.outputs.version }}.bin
            dist/b1-slave-v${{ steps.version.outputs.version }}.bin
            dist/bootloader.bin
            dist/partitions.bin
            dist/firmware_manifest.json
